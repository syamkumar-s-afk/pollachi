<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>SpotNews — Tamil Nadu Business Directory | Find Local Businesses</title>
    <meta name="description" content="SpotNews is Tamil Nadu's premier business directory. Discover, connect, and grow with the best local businesses across all 38 districts — from Coimbatore to Chennai." />
    <meta name="keywords" content="Tamil Nadu business directory, local businesses, SpotNews, Pollachi, Coimbatore, Chennai, business listings" />
    <meta name="author" content="SpotNews" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="SpotNews — Tamil Nadu Business Directory" />
    <meta property="og:description" content="Discover, connect, and grow with the best local businesses across Tamil Nadu. 38 districts. Thousands of businesses." />
    <meta property="og:site_name" content="SpotNews" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SpotNews — Tamil Nadu Business Directory" />
    <meta name="twitter:description" content="Discover, connect, and grow with the best local businesses across Tamil Nadu." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Google Fonts — Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#e62227" />
  </head>

    <div id="root"></div>
